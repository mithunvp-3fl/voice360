name: EAS build (manual)

# Triggered by hand when native code, deps, or app.json change and a fresh
# APK/IPA is needed. Builds run in EAS cloud; the resulting binary URL is
# posted in the workflow summary.

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        required: true
        default: 'preview'
        type: choice
        options: [preview, production]
      platform:
        description: 'Platform'
        required: true
        default: 'android'
        type: choice
        options: [android, ios, all]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - run: pnpm install --frozen-lockfile

      - name: Run EAS build
        working-directory: apps/mobile
        run: eas build --non-interactive --profile ${{ inputs.profile }} --platform ${{ inputs.platform }}
